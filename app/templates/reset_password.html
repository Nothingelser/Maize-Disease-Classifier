<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | MaizeGuard AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/professional.css') }}">
</head>
<body>
    <div class="app-shell">
        <header class="site-header">
            <div class="site-header-inner">
                <a class="brand" href="/">
                    <div class="brand-mark"><i class="fas fa-leaf"></i></div>
                    <div class="brand-copy">
                        <span class="brand-title">MaizeGuard AI</span>
                        <span class="brand-subtitle">Set new password</span>
                    </div>
                </a>
                <nav class="header-nav">
                    <a class="header-link" href="/">Detection</a>
                    <a class="header-link" href="/login">Sign in</a>
                    <a class="header-link" href="/support">Support</a>
                </nav>
                <div class="header-actions">
                    <button class="dark-mode-toggle" type="button" aria-label="Toggle dark mode"><i class="fas fa-moon"></i></button>
                </div>
            </div>
        </header>

        <main class="page-shell">
            <section class="auth-shell" style="grid-template-columns: 1fr; max-width: 720px; margin: 0 auto;">
                <div class="premium-card auth-card">
                    <div class="section-heading">
                        <div>
                            <h2>Create a new password</h2>
                            <div class="section-copy">Set a strong password for your account.</div>
                        </div>
                    </div>

                    <form class="auth-form" id="resetConfirmForm">
                        <div class="field">
                            <label for="password">New password</label>
                            <div class="password-field">
                                <input id="password" name="password" type="password" minlength="8" required>
                                <button class="password-toggle" type="button" data-password-toggle="password" aria-label="Show password" aria-pressed="false">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="field">
                            <label for="confirmPassword">Confirm new password</label>
                            <div class="password-field">
                                <input id="confirmPassword" name="confirmPassword" type="password" minlength="8" required>
                                <button class="password-toggle" type="button" data-password-toggle="confirmPassword" aria-label="Show password" aria-pressed="false">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <button class="btn btn-primary" type="submit">
                            <i class="fas fa-key"></i>
                            Update password
                        </button>
                    </form>

                    <p class="auth-footer">
                        Back to <a href="/login"><strong>sign in</strong></a>.
                    </p>
                </div>
            </section>
        </main>

        <footer class="site-footer">
            <div class="site-footer-inner">
                <div class="site-footer-copy">&copy; 2026 MaizeGuard AI. All rights reserved.</div>
                <div class="site-footer-links">
                    <a href="/about">About</a>
                    <a href="/privacy">Privacy</a>
                    <a href="/support">Support</a>
                </div>
            </div>
        </footer>

        <div class="toast-container"></div>
    </div>

    <script src="{{ url_for('static', filename='js/dark-mode.js') }}"></script>
    <script>
        const toastContainer = document.querySelector('.toast-container');

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            toastContainer.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add('show'));
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 220);
            }, 3200);
        }

        function getRecoveryToken() {
            return sessionStorage.getItem('password_reset_access_token') || '';
        }

        document.querySelectorAll('[data-password-toggle]').forEach((button) => {
            button.addEventListener('click', () => {
                const input = document.getElementById(button.dataset.passwordToggle);
                const icon = button.querySelector('i');
                const showing = input.type === 'text';

                input.type = showing ? 'password' : 'text';
                button.setAttribute('aria-pressed', String(!showing));
                button.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
                icon.className = showing ? 'fas fa-eye' : 'fas fa-eye-slash';
            });
        });

        document.getElementById('resetConfirmForm').addEventListener('submit', async (event) => {
            event.preventDefault();

            const token = getRecoveryToken();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!token) {
                showToast('Reset session is missing or expired. Request a new reset link.', 'error');
                return;
            }

            if (password.length < 8) {
                showToast('Password must be at least 8 characters long.', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showToast('Passwords do not match.', 'error');
                return;
            }

            try {
                const response = await fetch('/api/password/reset-confirm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ access_token: token, password })
                });
                const data = await response.json();

                if (!response.ok) {
                    showToast(data.error || 'Password reset failed', 'error');
                    return;
                }

                sessionStorage.removeItem('password_reset_access_token');
                sessionStorage.removeItem('password_reset_refresh_token');
                showToast(data.message || 'Password updated');
                setTimeout(() => {
                    window.location.href = '/login';
                }, 900);
            } catch (error) {
                showToast(`Password reset failed: ${error.message}`, 'error');
            }
        });
    </script>
</body>
</html>
