<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | MaizeGuard AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/professional.css') }}">
</head>
<body>
    <div class="app-shell">
        <header class="site-header">
            <div class="site-header-inner">
                <a class="brand" href="/">
                    <div class="brand-mark"><i class="fas fa-leaf"></i></div>
                    <div class="brand-copy">
                        <span class="brand-title">MaizeGuard AI</span>
                        <span class="brand-subtitle">Password recovery</span>
                    </div>
                </a>
                <nav class="header-nav">
                    <a class="header-link" href="/">Detection</a>
                    <a class="header-link" href="/login">Sign in</a>
                    <a class="header-link" href="/support">Support</a>
                </nav>
                <div class="header-actions">
                    <button class="dark-mode-toggle" type="button" aria-label="Toggle dark mode"><i class="fas fa-moon"></i></button>
                </div>
            </div>
        </header>

        <main class="page-shell">
            <section class="auth-shell" style="grid-template-columns: 1fr; max-width: 720px; margin: 0 auto;">
                <div class="premium-card auth-card">
                    <div class="section-heading">
                        <div>
                            <h2>Reset password</h2>
                            <div class="section-copy">Enter your account email and we will send a password reset link.</div>
                        </div>
                    </div>

                    <form class="auth-form" id="resetForm">
                        <div class="field">
                            <label for="email">Email</label>
                            <input id="email" name="email" type="email" required>
                        </div>
                        <button class="btn btn-primary" type="submit">
                            <i class="fas fa-paper-plane"></i>
                            Send reset link
                        </button>
                    </form>

                    <p class="auth-footer">
                        Back to <a href="/login"><strong>sign in</strong></a>.
                    </p>
                </div>
            </section>
        </main>

        <footer class="site-footer">
            <div class="site-footer-inner">
                <div class="site-footer-copy">&copy; 2026 MaizeGuard AI. All rights reserved.</div>
                <div class="site-footer-links">
                    <a href="/about">About</a>
                    <a href="/privacy">Privacy</a>
                    <a href="/support">Support</a>
                </div>
            </div>
        </footer>

        <div class="toast-container"></div>
    </div>

    <script src="{{ url_for('static', filename='js/dark-mode.js') }}"></script>
    <script>
        const toastContainer = document.querySelector('.toast-container');

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            toastContainer.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add('show'));
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 220);
            }, 3200);
        }

        document.getElementById('resetForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const email = document.getElementById('email').value.trim();

            try {
                const response = await fetch('/api/password/reset-request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();

                if (!response.ok) {
                    showToast(data.error || 'Unable to send reset email', 'error');
                    return;
                }

                showToast(data.message || 'If the account exists, a reset link has been sent.');
                document.getElementById('resetForm').reset();
            } catch (error) {
                showToast(`Unable to send reset email: ${error.message}`, 'error');
            }
        });
    </script>
</body>
</html>
