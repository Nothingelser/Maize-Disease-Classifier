[loggers]
keys=root,app,api,services,models,src

[handlers]
keys=consoleHandler,fileHandler,errorFileHandler,rotatingFileHandler

[formatters]
keys=simpleFormatter,detailedFormatter,jsonFormatter

[logger_root]
level=INFO
handlers=consoleHandler

[logger_app]
level=DEBUG
handlers=consoleHandler,rotatingFileHandler
qualname=app
propagate=0

[logger_api]
level=INFO
handlers=consoleHandler,rotatingFileHandler,errorFileHandler
qualname=api
propagate=0

[logger_services]
level=INFO
handlers=consoleHandler,rotatingFileHandler
qualname=services
propagate=0

[logger_models]
level=INFO
handlers=consoleHandler,rotatingFileHandler
qualname=models
propagate=0

[logger_src]
level=DEBUG
handlers=consoleHandler,rotatingFileHandler
qualname=src
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=simpleFormatter
args=(sys.stdout,)

[handler_fileHandler]
class=FileHandler
level=DEBUG
formatter=detailedFormatter
args=('logs/app.log', 'a', 'utf-8')

[handler_errorFileHandler]
class=FileHandler
level=ERROR
formatter=detailedFormatter
args=('logs/error.log', 'a', 'utf-8')

[handler_rotatingFileHandler]
class=handlers.RotatingFileHandler
level=DEBUG
formatter=detailedFormatter
args=('logs/app.log', 'a', 10485760, 5, 'utf-8')

[formatter_simpleFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_detailedFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - [%(filename)s:%(lineno)d] - %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_jsonFormatter]
class=pythonjsonlogger.jsonlogger.JsonFormatter
format=%(asctime)s %(name)s %(levelname)s %(filename)s %(lineno)d %(message)s